<div class="form-container">
    <h3>Inicio de sessión</h3>
    <form [formGroup]="loginForm" (ngSubmit)="login()">
        <div class="email mb-2">
            <label for="email" class="form-label">Correo Electrónico</label>
            <input type="email"
                class="form-control"
                id="email"
                formControlName="email"
                [class.is-invalid]="form['email'].dirty && form['email'].invalid"
                [class.is-valid]="form['email'].dirty && form['email'].valid"
                placeholder="name@example.com" />
            <div class="error-message alert alert-danger" *ngIf="form['email'].dirty && form['email'].invalid">
                {{ getErrorMessage('email') }}
            </div>
        </div>
        
        <div class="password">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password"
                class="form-control"
                id="password"
                formControlName="password"
                [class.is-invalid]="form['password'].dirty && form['password'].invalid"
                [class.is-valid]="form['password'].dirty && form['password'].valid"/>
            <div class="error-message alert alert-danger" *ngIf="form['password'].dirty && form['password'].invalid">
                {{ getErrorMessage('password') }}
            </div>
        </div>
        <div class="login">
            <button class="btn btn-primary">Acceso</button>
        </div>
    </form>
</div>
